name: release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Tag to release (e.g. v0.1.0). Dispatch only — tag push is normal path.'
        required: true
        type: string

concurrency:
  group: 'release-${{ github.ref }}'
  cancel-in-progress: false

jobs:
  build-matrix:
    name: build (${{ matrix.rid }})
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x64
            archive: tar.gz
          - os: ubuntu-latest
            rid: linux-arm64
            archive: tar.gz
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@df991aeaf2a76aae144b0b70ce23e455c66f061e # v4.3.1
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Derive version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            raw="${{ inputs.version }}"
          else
            raw="${GITHUB_REF_NAME}"
          fi
          version="${raw#v}"
          echo "VERSION=${version}" >> "$GITHUB_ENV"
          echo "TAG=${raw}" >> "$GITHUB_ENV"
          echo "Derived VERSION=${version} TAG=${raw}"

      - name: Publish (${{ matrix.rid }})
        shell: bash
        run: |
          dotnet publish src/Drederick/Drederick.csproj \
            -c Release \
            -r ${{ matrix.rid }} \
            --self-contained true \
            -p:PublishSingleFile=true \
            -p:IncludeNativeLibrariesForSelfExtract=true \
            -p:Version=${{ env.VERSION }} \
            -o publish/${{ matrix.rid }}

      - name: Package (tar.gz)
        shell: bash
        run: |
          staging="staging/${{ matrix.rid }}"
          mkdir -p "$staging/docs"
          cp "publish/${{ matrix.rid }}/drederick" "$staging/drederick"
          chmod +x "$staging/drederick"
          cp LICENSE "$staging/docs/LICENSE"
          cp README.md "$staging/docs/README.md"
          archive="drederick-${VERSION}-${{ matrix.rid }}.tar.gz"
          tar -czf "$archive" -C "$staging" drederick docs
          echo "ARCHIVE=$archive" >> "$GITHUB_ENV"

      - name: Compute SHA-256
        shell: bash
        run: |
          sha256sum "$ARCHIVE" > "${ARCHIVE}.sha256"
          cat "${ARCHIVE}.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: drederick-${{ matrix.rid }}
          path: |
            drederick-*-${{ matrix.rid }}.tar.gz
            drederick-*-${{ matrix.rid }}.tar.gz.sha256
          if-no-files-found: error
          retention-days: 7

  release:
    name: publish release
    needs: build-matrix
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Derive version/tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            raw="${{ inputs.version }}"
          else
            raw="${GITHUB_REF_NAME}"
          fi
          version="${raw#v}"
          echo "VERSION=${version}" >> "$GITHUB_ENV"
          echo "TAG=${raw}" >> "$GITHUB_ENV"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Consolidate into dist/ and build SHA256SUMS
        shell: bash
        run: |
          mkdir -p dist
          find artifacts -type f -name 'drederick-*.tar.gz' -exec cp -v {} dist/ \;
          find artifacts -type f -name '*.sha256' -print0 | xargs -0 cat > dist/SHA256SUMS
          echo "---- dist/ contents ----"
          ls -la dist
          echo "---- SHA256SUMS ----"
          cat dist/SHA256SUMS

      - name: Write RELEASE_NOTES.md
        shell: bash
        run: |
          tag="${TAG}"
          version="${VERSION}"
          repo="${GITHUB_REPOSITORY}"
          cat > dist/RELEASE_NOTES.md <<EOF
          ## drederick ${tag}

          Self-contained, single-file binaries for Linux (x64 and arm64).

          Drederick is a Linux-first tool targeting Kali/Parrot operator workstations.

          ### Install (Linux)

          \`\`\`sh
          curl -fsSL https://github.com/${repo}/releases/download/${tag}/drederick-${version}-linux-x64.tar.gz | tar -xzf - drederick
          install -m 755 drederick ~/.local/bin/
          drederick --help
          \`\`\`

          Replace \`linux-x64\` with \`linux-arm64\` for ARM64 hosts.

          ### Verify downloads (SHA-256)

          \`\`\`sh
          curl -fsSL https://github.com/${repo}/releases/download/${tag}/SHA256SUMS -o SHA256SUMS
          sha256sum -c SHA256SUMS --ignore-missing
          \`\`\`

          ### Next steps

          Verify your toolchain: \`drederick doctor\`

          First-time setup: \`drederick init\`

          See [docs/MODULES.md](https://github.com/${repo}/blob/${tag}/docs/MODULES.md) for module reference.
          EOF
          echo "---- RELEASE_NOTES.md ----"
          cat dist/RELEASE_NOTES.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          tag_name: ${{ env.TAG }}
          name: ${{ env.TAG }}
          files: |
            dist/drederick-*.tar.gz
            dist/SHA256SUMS
          body_path: dist/RELEASE_NOTES.md
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
