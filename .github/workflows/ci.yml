name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  checks: write
  pull-requests: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.os != 'ubuntu-latest' }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/Directory.Build.props') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore Drederick.slnx

      - name: Build
        run: dotnet build Drederick.slnx -c Release --no-restore --nologo

      - name: Format check
        run: dotnet format Drederick.slnx --verify-no-changes --no-restore

      - name: Test
        run: dotnet test Drederick.slnx -c Release --no-build --nologo --logger "trx;LogFileName=results.trx" --results-directory ./TestResults

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.os }}
          path: ./TestResults/**/*.trx

      - name: Publish test report
        if: always()
        # dorny/test-reporter v1.9.1
        uses: dorny/test-reporter@890a17cecf52a379fc869ab770a71657660be727
        with:
          name: tests (${{ matrix.os }})
          path: ./TestResults/**/*.trx
          reporter: dotnet-trx
          fail-on-error: false
