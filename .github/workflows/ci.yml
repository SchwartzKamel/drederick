name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  checks: write
  pull-requests: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup .NET 10
        uses: actions/setup-dotnet@df991aeaf2a76aae144b0b70ce23e455c66f061e # v4.3.1
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v4.3.0
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/Directory.Build.props') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore Drederick.slnx

      - name: Build
        run: dotnet build Drederick.slnx -c Release --no-restore --nologo

      - name: Format check
        run: dotnet format Drederick.slnx --verify-no-changes --no-restore

      - name: Test
        run: dotnet test Drederick.slnx -c Release --no-build --nologo --logger "trx;LogFileName=results.trx" --results-directory ./TestResults

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: test-results
          path: ./TestResults/**/*.trx

      - name: Publish test report
        if: always()
        # dorny/test-reporter v1.9.1
        uses: dorny/test-reporter@890a17cecf52a379fc869ab770a71657660be727
        with:
          name: tests
          path: ./TestResults/**/*.trx
          reporter: dotnet-trx
          fail-on-error: false
